<svg width="400" height="150" xmlns="http://www.w3.org/2000/svg">
  <!-- Vertebral Segments -->
  <g fill="none" stroke="black" stroke-width="2">
    <!-- Segment 1 -->
    <rect x="20" y="50" width="40" height="20" rx="5" />
    <circle cx="60" cy="60" r="3" fill="red" /> <!-- Pivot -->
    
    <!-- Segment 2 -->
    <rect x="60" y="50" width="40" height="20" rx="5" />
    <circle cx="100" cy="60" r="3" fill="red" /> <!-- Pivot -->
    
    <!-- Segment 3 -->
    <rect x="100" y="50" width="40" height="20" rx="5" />
    <circle cx="140" cy="60" r="3" fill="red" /> <!-- Pivot -->
    
    <!-- Segment 4 -->
    <rect x="140" y="50" width="40" height="20" rx="5" />
    <circle cx="180" cy="60" r="3" fill="red" /> <!-- Pivot -->
    
    <!-- LED Strip Path -->
    <path d="M 20 45 L 220 45" stroke="blue" stroke-dasharray="5,5" />
  </g>
  
  <!-- Labels -->
  <text x="20" y="90" font-family="Arial" font-size="10">Vertebra Segment</text>
  <text x="185" y="65" font-family="Arial" font-size="10" fill="red">Servo Pivot</text>
  <text x="20" y="40" font-family="Arial" font-size="10" fill="blue">LED Strip (Top)</text>
</svg>
